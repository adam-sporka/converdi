BEGIN JOBDESC 'Test.Strings';
	SPLIT VOICES;

	SCOPE Slur AND Staccato;
		TASK 1 SetVelocity vel=1;

	SCOPE Slur;
		TASK 101 RegionStartCC cc=64 val=127;
		TASK 102 RegionEndCC cc=64 val=0;

	SCOPE Staccato;
		TASK 201 SetVelocity vel=1;

	SCOPE All;
		TASK 301 SetVelocity vel=127;
		TASK 302 DynamicsAsCC cc=1 table=CineSamplesDefault;

	MERGE SCOPES;
	MERGE VOICES;
	MERGE GRAND STAFF;
	
	FINALLY;
		TASK 999 TrailByCC cc=7 val=127;
	
END JOBDESC;