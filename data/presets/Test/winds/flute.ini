BEGIN JOBDESC 'Test.Winds.Flute';
  SPLIT VOICES;
  
  SCOPE Tremolo INTO TRACK 'Tremoli';
  SCOPE Trill INTO TRACK 'Tremoli';
  
	SCOPE Slur INTO TRACK '';
		TASK 101 RegionStartCC cc=64 val=127;
		TASK 102 RegionEndCC cc=64 val=0;
		TASK 103 DynamicsAsCC cc=1 table=CineSamplesDefault;
		TASK 104 TransposeBy semitones=24;
		TASK 105 DynamicsAsCC cc=2 table=SomeWeirdTest;
		TASK 106 ShiftAllEvents delta_t=-100;

	SCOPE All INTO TRACK '';
		TASK 301 SetVelocity vel=127;
		TASK 302 DynamicsAsCC cc=1 table=CineSamplesDefault;
		TASK 303 ShiftAllEvents delta_t=-100;

  MERGE SCOPES;
	MERGE VOICES;
	MERGE GRAND STAFF;
	
	FINALLY;
		TASK 999 TrailByCC cc=7 val=127;
	
END JOBDESC;