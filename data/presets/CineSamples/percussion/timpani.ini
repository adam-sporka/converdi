BEGIN JOBDESC 'CineSamples.percussion.timpani';

	SPLIT VOICES;

	SCOPE Trill INTO TRACK "2_Tremolo";
		TASK 101 TransposeBy semitones=-12;
		TASK 102 DynamicsAsCC cc=1 table='CineSamples.percussion.timpani.CC1';

	SCOPE Tremolo INTO TRACK "2_Tremolo";
		TASK 201 TransposeBy semitones=-12;
		TASK 202 DynamicsAsCC cc=1 table='CineSamples.percussion.timpani.CC1';
		
	SCOPE All INTO TRACK "1_Naturale";
		TASK 301 TransposeBy semitones=12;
		TASK 302 DynamicsAsVelocity table='CineSamples.percussion.timpani.velocity';
		
  MERGE SCOPES;
	MERGE VOICES;
	MERGE GRAND STAFF;
	
END JOBDESC;