BEGIN DYNTABLE 'Game.strings.liuto.velocity'
	ppppp = 0;
	 pppp = 0;
	  ppp = 28;
	   pp = 40;
	    p = 52;
	   mp = 64;
	   mf = 80;
	undef = 80;
	pocof = 80;
	    f = 96;
	   ff = 112;
	  fff = 127;
	 ffff = 127;
	fffff = 127;
END DYNTABLE;

BEGIN JOBDESC 'Game.strings.liuto';

	SPLIT VOICES;

	SCOPE Staccato;
		TASK 101 DynamicsAsVelocity table='Game.strings.liuto.velocity';
		TASK 102 ShortenAllNotes percent=50;

	SCOPE Slur;
		TASK 201 DynamicsAsVelocity table='Game.strings.liuto.velocity';
		TASK 202 Arpeggio each_ms=40 pitch_ms=0;
		TASK 203 ShortenLastNote percent=10;

	SCOPE All;
		TASK 301 DynamicsAsVelocity table='Game.strings.liuto.velocity';
		TASK 302 Arpeggio each_ms=40 pitch_ms=0;
		TASK 303 ShortenAllNotes percent=10;	

  MERGE SCOPES;
	MERGE VOICES;
	MERGE GRAND STAFF;
	
END JOBDESC;