BEGIN DYNTABLE 'Game.strings.chitarra.velocity'
	ppppp = 0;
	 pppp = 0;
	  ppp = 32;
	   pp = 48;
	    p = 64;
	   mp = 80;
	   mf = 96;
	undef = 96;
	pocof = 96;
	    f = 112;
	   ff = 112;
	  fff = 127;
	 ffff = 127;
	fffff = 127;
END DYNTABLE;

BEGIN JOBDESC 'Game.strings.chitarra';

	SPLIT VOICES;

	SCOPE Staccato; 
		TASK 101 DynamicsAsVelocity table='Game.strings.chitarra.velocity';
		TASK 102 ShortenAllNotes percent=50;
		TASK 103 TransposeBy semitones=12;

	SCOPE Slur;
		TASK 201 DynamicsAsVelocity table='Game.strings.chitarra.velocity';
		TASK 202 Arpeggio each_ms=40 pitch_ms=0;
		TASK 203 ShortenLastNote percent=20;
		TASK 204 TransposeBy semitones=12;

	SCOPE All;
		TASK 301 DynamicsAsVelocity table='Game.strings.chitarra.velocity';
		TASK 302 Arpeggio each_ms=40 pitch_ms=0;
		TASK 303 ShortenAllNotes percent=10;
		TASK 304 TransposeBy semitones=12;

  MERGE SCOPES;
	MERGE VOICES;
	MERGE GRAND STAFF;
	
END JOBDESC;