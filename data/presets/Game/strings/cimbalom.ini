BEGIN JOBDESC 'Game.strings.cimbalom';

	SPLIT VOICES;

	SCOPE Tremolo INTO TRACK '2_Tremolo';
		TASK 401 DynamicsAsCC cc=1 table='Game.strings.cimbalom.CC1';
		TASK 402 PedalAsCC cc=64 begin_value=127 end_value=0;
		TASK 403 TransposeBy semitones=12;

	SCOPE Staccato INTO TRACK '1_Naturale';
		TASK 101 DynamicsAsVelocity table='Game.strings.cimbalom.velocity';
		TASK 102 ShortenAllNotes percent=50;
		TASK 103 TransposeBy semitones=12;

	SCOPE Slur INTO TRACK '1_Naturale';
		TASK 201 DynamicsAsVelocity table='Game.strings.cimbalom.velocity';
		TASK 202 Arpeggio each_ms=40 pitch_ms=0;
		TASK 203 ShortenLastNote percent=10;
		TASK 204 TransposeBy semitones=12;

	SCOPE All INTO TRACK '1_Naturale';
		TASK 301 DynamicsAsVelocity table='Game.strings.cimbalom.velocity';
		TASK 302 Arpeggio each_ms=40 pitch_ms=0;
		TASK 303 ShortenAllNotes percent=10;
		TASK 304 PedalAsCC cc=64 begin_value=127 end_value=0;
		TASK 305 TransposeBy semitones=12;

  MERGE SCOPES;
	MERGE VOICES;
	MERGE GRAND STAFF;
	
END JOBDESC;