BEGIN DYNTABLE 'Game.percussion.triangolo.velocity'
	ppppp = 0;
	 pppp = 0;
	  ppp = 20;
	   pp = 35;
	    p = 50;
	   mp = 65;
	   mf = 70;
	undef = 65;
	pocof = 70;
	    f = 85;
	   ff = 100;
	  fff = 115;
	 ffff = 127;
	fffff = 127;
END DYNTABLE;

BEGIN JOBDESC 'Game.percussion.triangolo';

	SPLIT VOICES;

	SCOPE Staccato;
		TASK 101 SetNotesTo midi_no=C3;
		TASK 102 DynamicsAsVelocity table='Game.percussion.triangolo.velocity';
		
	SCOPE Trill;
		TASK 202 RegionStartCC cc=64 val=127;
		TASK 203 RegionEndCC cc=64 val=0;
		
	SCOPE MidiRange B4 B4;
		TASK 998 SetNotesTo midi_no=C4;
		TASK 999 DynamicsAsVelocity table='Game.percussion.triangolo.velocity';

  MERGE SCOPES;
	MERGE VOICES;
	MERGE GRAND STAFF;
	
END JOBDESC;