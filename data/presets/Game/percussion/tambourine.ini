BEGIN JOBDESC 'Game.percussion.tambourine';

	SPLIT VOICES;

	SCOPE Trill;
		TASK 101 SetNotesTo midi_no=D#4;
		TASK 102 DynamicsAsCC table='Game.percussion.tambourine.CC1';

	SCOPE Tremolo;
		TASK 201 SetNotesTo midi_no=D#4;
		TASK 202 DynamicsAsCC table='Game.percussion.tambourine.CC1';
		
	SCOPE All;
		TASK 301 SetNotesTo midi_no=D3;
		TASK 302 DynamicsAsVelocity table='Game.percussion.tambourine.velocity';
		
  MERGE SCOPES;
	MERGE VOICES;
	MERGE GRAND STAFF;
	
END JOBDESC;