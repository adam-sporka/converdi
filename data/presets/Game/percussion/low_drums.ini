BEGIN JOBDESC 'Game.percussion.low_drums';

	SPLIT VOICES;

	SCOPE Tremolo;
		TASK 101 SetNotesTo midi_no=C#5;
		TASK 102 DynamicsAsCC cc=1 table='Game.percussion.low_drums.CC1';

	SCOPE Trill;
		TASK 201 SetNotesTo midi_no=C#5;
		TASK 202 DynamicsAsCC cc=1 table='Game.percussion.low_drums.CC1';

	SCOPE MidiRange G4 G4;
		TASK 301 SetNotesTo midi_no=E3;
		TASK 302 DynamicsAsVelocity table='Game.percussion.low_drums.CC1';

	SCOPE MidiRange D5 D5;
		TASK 401 SetNotesTo midi_no=F3;
		TASK 402 DynamicsAsVelocity table='Game.percussion.low_drums.CC1';
		
  MERGE SCOPES;
	MERGE VOICES;
	MERGE GRAND STAFF;
	
END JOBDESC;