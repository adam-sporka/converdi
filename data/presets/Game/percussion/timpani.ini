BEGIN JOBDESC 'Game.percussion.timpani';

	SPLIT VOICES;

	SCOPE Trill INTO TRACK '2_Tremolo';
		TASK 101 DynamicsAsCC cc=1 table='Game.percussion.timpani.CC1';
		TASK 102 TransposeBy semitones=12;

	SCOPE Tremolo INTO TRACK '2_Tremolo';
		TASK 202 DynamicsAsCC cc=1 table='Game.percussion.timpani.CC1';
		TASK 102 TransposeBy semitones=12;
		
	SCOPE All INTO TRACK '1_Naturale';
		TASK 301 DynamicsAsVelocity table='Game.percussion.timpani.velocity';
		TASK 302 TransposeBy semitones=12;
		
  MERGE SCOPES;
	MERGE VOICES;
	MERGE GRAND STAFF;
	
END JOBDESC;